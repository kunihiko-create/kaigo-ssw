    function doSpeak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP"; u.rate = 0.82; u.pitch = 1.05;
      const v = window.speechSynthesis.getVoices().find(x => x.lang.startsWith("ja"));
      if (v) u.voice = v;
      window.speechSynthesis.speak(u);
    }

    // ═══════════════════════════════════════════════════════════
    //  FLASHCARD MODULE
    // ═══════════════════════════════════════════════════════════
    function FlashcardModule({ lesson }) {
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [scores, setScores] = useState({});
      const [done, setDone] = useState(false);

      useEffect(() => { setIdx(0); setFlipped(false); setScores({}); setDone(false); }, [lesson.id]);

      const cards = lesson.flashcards;
      const card = cards[idx];
      const okCount = Object.values(scores).filter(s => s === "ok").length;
      const pct = Math.round((okCount / cards.length) * 100);

      function answer(ok) {
        setScores(prev => ({ ...prev, [idx]: ok ? "ok" : "ng" }));
        setFlipped(false);
        setTimeout(() => {
          if (idx + 1 >= cards.length) setDone(true);
          else setIdx(i => i + 1);
        }, 220);
      }

      if (done) return (
        <div style={{ textAlign: "center", padding: "2rem 1rem" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>{pct === 100 ? "🏆" : pct >= 70 ? "⭐" : "💪"}</div>
          <div style={{ fontSize: 26, fontWeight: 700, color: "#1A1A1A", marginBottom: 6 }}>
            {okCount} / {cards.length} 正解
          </div>
          <div style={{ fontSize: 13, color: "#888", marginBottom: 20 }}>
            {pct === 100 ? "完璧！Sempurna!" : pct >= 70 ? "よくできました！Bagus!" : "もう一度練習しましょう！"}
          </div>
          <button onClick={() => { setIdx(0); setFlipped(false); setScores({}); setDone(false); }} style={{
            padding: "11px 28px", borderRadius: 10, border: "none",
            background: lesson.color, color: "#fff", fontSize: 14, fontWeight: 700,
            cursor: "pointer", fontFamily: "inherit",
          }}>もう一度 / Ulangi</button>
        </div>
      );

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <span style={{ fontSize: 13, color: "#888" }}>{idx + 1} / {cards.length}</span>
            <div style={{ display: "flex", gap: 4 }}>
              {cards.map((_, i) => (
                <div key={i} style={{
                  width: i === idx ? 18 : 7, height: 7, borderRadius: 4,
                  background: scores[i] === "ok" ? "#3DAB7A" : scores[i] === "ng" ? "#E24B4A" : i === idx ? lesson.color : "#DDD",
                  transition: "all 0.3s",
                }}/>
              ))}
            </div>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#3DAB7A" }}>{pct}%</span>
          </div>

          <div onClick={() => setFlipped(f => !f)} style={{ cursor: "pointer", perspective: 1000, height: 200, marginBottom: 16 }}>
            <div style={{
              width: "100%", height: "100%", position: "relative",
              transformStyle: "preserve-3d",
              transform: flipped ? "rotateY(180deg)" : "rotateY(0)",
              transition: "transform 0.4s",
            }}>
              <div style={{
                position: "absolute", width: "100%", height: "100%",
                backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden",
                background: "#fff", border: `1.5px solid ${lesson.color}33`,
                borderRadius: 16,
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6,
              }}>
                <div style={{ fontSize: 11, color: "#CCC" }}>タップして裏へ / Ketuk untuk balik</div>
                <div style={{ fontSize: 34, fontWeight: 700, color: "#1A1A1A" }}>{card.jp}</div>
                <div style={{ fontSize: 14, color: "#AAA" }}>{card.romaji}</div>
                <button onClick={e => { e.stopPropagation(); doSpeak(card.jp); }} style={{
                  marginTop: 4, padding: "4px 14px", borderRadius: 999,
                  border: `1px solid ${lesson.color}`, background: "transparent",
                  color: lesson.color, fontSize: 12, cursor: "pointer", fontFamily: "inherit",
                }}>▶ 音声</button>
              </div>
              <div style={{
                position: "absolute", width: "100%", height: "100%",
                backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden",
                transform: "rotateY(180deg)",
                background: lesson.light, border: `1.5px solid ${lesson.color}55`,
                borderRadius: 16,
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6,
                padding: "1rem",
              }}>
                <div style={{ fontSize: 13, color: "#777" }}>{card.jp} — {card.romaji}</div>
                <div style={{ fontSize: 26, fontWeight: 700, color: lesson.color }}>{card.indo}</div>
                <div style={{ fontSize: 12, color: "#888", textAlign: "center", fontStyle: "italic" }}>{card.ex}</div>
              </div>
            </div>
          </div>

          {flipped ? (
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => answer(false)} style={{
                flex: 1, padding: "12px 0", borderRadius: 10,
                border: "1.5px solid #E24B4A", background: "transparent",
                color: "#E24B4A", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
              }}>✕ 不正解 / Salah</button>
              <button onClick={() => answer(true)} style={{
                flex: 1, padding: "12px 0", borderRadius: 10, border: "none",
                background: "#3DAB7A", color: "#fff", fontSize: 14, fontWeight: 700,
                cursor: "pointer", fontFamily: "inherit",
              }}>○ 正解 / Benar</button>
            </div>
          ) : (
            <button onClick={() => setFlipped(true)} style={{
              width: "100%", padding: "12px 0", borderRadius: 10,
              border: `1.5px solid ${lesson.color}`, background: "transparent",
              color: lesson.color, fontSize: 14, fontWeight: 700,
              cursor: "pointer", fontFamily: "inherit",
            }}>カードをめくる / Balik kartu</button>
          )}

          <div style={{ marginTop: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#AAA", letterSpacing: "0.08em", marginBottom: 8 }}>単語一覧 / DAFTAR KATA</div>
            <div style={{ border: "0.5px solid #E8E6DF", borderRadius: 10, overflow: "hidden" }}>
              {cards.map((w, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "8px 12px",
                  borderBottom: i < cards.length - 1 ? "0.5px solid #F0EEE8" : "none",
                  background: idx === i ? lesson.light : "transparent",
                }}>
                  <div style={{
                    width: 7, height: 7, borderRadius: "50%", flexShrink: 0,
                    background: scores[i] === "ok" ? "#3DAB7A" : scores[i] === "ng" ? "#E24B4A" : "#DDD",
                  }}/>
                  <span style={{ fontSize: 14, flex: 1 }}>{w.jp}</span>
                  <span style={{ fontSize: 12, color: "#AAA" }}>{w.romaji}</span>
                  <span style={{ fontSize: 12, color: "#555", minWidth: 110, textAlign: "right" }}>{w.indo}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  EXERCISE WITH RESULT
    // ═══════════════════════════════════════════════════════════
    function ExerciseWithResult({ ex, color, light, qNum, total, isLast, onDone }) {
      const [sortSel, setSortSel] = useState([]);
      const [sortUsed, setSortUsed] = useState([]);
      const [fillSel, setFillSel] = useState(null);
      const [confirmed, setConfirmed] = useState(false);

      const isFill = ex.type === "fill";

      function isCorrect() {
        if (isFill) return fillSel === ex.answer;
        return JSON.stringify(sortSel) === JSON.stringify(ex.answer);
      }

      function addWord(w) {
        if (confirmed || sortUsed.includes(w)) return;
        setSortSel(prev => [...prev, w]);
        setSortUsed(prev => [...prev, w]);
      }
      function removeWord(i) {
        if (confirmed) return;
        const w = sortSel[i];
        setSortSel(prev => prev.filter((_, j) => j !== i));
        setSortUsed(prev => { const a = [...prev]; a.splice(a.indexOf(w), 1); return a; });
      }
      function reset() { setSortSel([]); setSortUsed([]); }

      const canConfirm = isFill ? fillSel !== null : sortSel.length > 0;
      const correct = isCorrect();

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ display: "flex", gap: 4 }}>
              {Array.from({ length: total }).map((_, i) => (
                <div key={i} style={{
                  width: i === qNum ? 18 : 7, height: 7, borderRadius: 4,
                  background: i < qNum ? "#3DAB7A" : i === qNum ? color : "#DDD",
                  transition: "all 0.3s",
                }}/>
              ))}
            </div>
            <span style={{ fontSize: 12, color: "#AAA" }}>問{qNum + 1}/{total}</span>
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            <span style={{
              fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 999,
              background: isFill ? "#EBF3FF" : "#EAF3DE",
              color: isFill ? "#0C447C" : "#27500A",
            }}>{isFill ? "穴埋め / Isian" : "並び替え / Susun Kata"}</span>
          </div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#1A1A1A", marginBottom: 2 }}>{ex.ctx}</div>
            <div style={{ fontSize: 12, color: "#888", fontStyle: "italic" }}>{ex.indo}</div>
          </div>

          {isFill && (
            <>
              <div style={{ fontSize: 17, lineHeight: 2.2, marginBottom: 14, display: "flex", flexWrap: "wrap", alignItems: "center", gap: 4 }}>
                {ex.template.map((part, i) =>
                  part === "___" ? (
                    <span key={i} style={{
                      display: "inline-block", minWidth: 80,
                      borderBottom: `2px solid ${confirmed ? (correct ? "#3DAB7A" : "#E24B4A") : color}`,
                      padding: "0 8px", fontWeight: 600,
                      color: confirmed ? (correct ? "#1A6B40" : "#8B1A1A") : color,
                      background: confirmed ? (correct ? "#EAF6EF" : "#FDEDEF") : "transparent",
                      borderRadius: confirmed ? 4 : 0, textAlign: "center",
                    }}>
                      {fillSel || "　　"}
                    </span>
                  ) : (
                    <span key={i}>{part}</span>
                  )
                )}
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                {ex.opts.map((o, i) => {
                  const sel = fillSel === o;
                  return (
                    <button key={i} onClick={() => !confirmed && setFillSel(o)} style={{
                      padding: "8px 18px", borderRadius: 999,
                      border: `1.5px solid ${sel ? color : "#DDD"}`,
                      background: sel ? `${color}18` : "#FAFAF8",
                      color: sel ? color : "#333",
                      fontSize: 14, fontWeight: sel ? 700 : 400,
                      cursor: confirmed ? "default" : "pointer",
                      fontFamily: "inherit", transition: "all 0.15s",
                    }}>{o}</button>
                  );
                })}
              </div>
            </>
          )}

          {!isFill && (
            <>
              <div style={{
                minHeight: 52, padding: "10px 12px", marginBottom: 12,
                border: `1.5px dashed ${confirmed ? (correct ? "#3DAB7A" : "#E24B4A") : "#CCC"}`,
                borderRadius: 10, display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center",
                background: confirmed ? (correct ? "#EAF6EF" : "#FDEDEF") : "#FAFAF8",
              }}>
                {sortSel.length === 0
                  ? <span style={{ fontSize: 12, color: "#CCC" }}>ここに単語を並べてください / Susun kata di sini</span>
                  : sortSel.map((w, i) => (
                    <span key={i} onClick={() => removeWord(i)} style={{
                      padding: "6px 13px", borderRadius: 999,
                      border: `1.5px solid ${confirmed ? (correct ? "#3DAB7A" : "#E24B4A") : color}`,
                      background: confirmed ? "transparent" : `${color}15`,
                      color: confirmed ? (correct ? "#1A6B40" : "#8B1A1A") : color,
                      fontSize: 14, fontWeight: 600,
                      cursor: confirmed ? "default" : "pointer",
                    }}>{w}</span>
                  ))
                }
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 8 }}>
                {ex.words.map((w, i) => (
                  <span key={i} onClick={() => addWord(w)} style={{
                    padding: "7px 14px", borderRadius: 999,
                    border: "1.5px solid #DDD",
                    background: sortUsed.includes(w) ? "#F0F0F0" : "#fff",
                    color: sortUsed.includes(w) ? "#CCC" : "#333",
                    fontSize: 14, fontWeight: 500,
                    cursor: sortUsed.includes(w) || confirmed ? "default" : "pointer",
                    transition: "all 0.15s",
                    pointerEvents: confirmed ? "none" : "auto",
                  }}>{w}</span>
                ))}
              </div>
              {!confirmed && sortSel.length > 0 && (
                <button onClick={reset} style={{
                  padding: "5px 14px", borderRadius: 8, border: "1px solid #DDD",
                  background: "transparent", color: "#888", fontSize: 12,
                  cursor: "pointer", fontFamily: "inherit", marginBottom: 10,
                }}>リセット / Reset</button>
              )}
            </>
          )}

          {confirmed && (
            <div style={{
              borderRadius: 10, padding: "12px 14px", marginBottom: 14,
              background: correct ? "#EAF6EF" : "#FDEDEF",
              border: `1px solid ${correct ? "#3DAB7A" : "#E24B4A"}`,
            }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: correct ? "#1A6B40" : "#8B1A1A", marginBottom: 4 }}>
                {correct ? "○ 正解！ Benar！" : "✕ 不正解 Salah"}
              </div>
              <div style={{ fontSize: 13, color: "#333", marginBottom: 2 }}>
                {isFill ? ex.exFull : ex.answer.join(" ")}
              </div>
              <div style={{ fontSize: 12, color: "#777", fontStyle: "italic" }}>
                {isFill ? ex.exIndo : ex.meaning}
              </div>
            </div>
          )}

          {!confirmed ? (
            <button onClick={() => canConfirm && setConfirmed(true)} disabled={!canConfirm} style={{
              width: "100%", padding: "12px 0", borderRadius: 10, border: "none",
              background: canConfirm ? color : "#CCC",
              color: "#fff", fontSize: 14, fontWeight: 700,
              cursor: canConfirm ? "pointer" : "default",
              fontFamily: "inherit", transition: "background 0.2s",
            }}>確認する / Cek Jawaban</button>
          ) : (
            <button onClick={() => onDone(correct)} style={{
              width: "100%", padding: "12px 0", borderRadius: 10, border: "none",
              background: isLast ? "#3DAB7A" : color,
              color: "#fff", fontSize: 14, fontWeight: 700,
              cursor: "pointer", fontFamily: "inherit",
            }}>
              {isLast ? "結果を見る / Lihat Hasil →" : "次へ / Berikutnya →"}
            </button>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  CONV MODULE
    // ═══════════════════════════════════════════════════════════
    function ConvModule({ lesson }) {
      const [qIdx, setQIdx] = useState(0);
      const [results, setResults] = useState([]);
      const [done, setDone] = useState(false);

      useEffect(() => { setQIdx(0); setResults([]); setDone(false); }, [lesson.id]);

      const exs = lesson.conversation.exercises;

      function handleDone(correct) {
        const nr = [...results, correct];
        setResults(nr);
        if (qIdx + 1 >= exs.length) setDone(true);
        else setQIdx(i => i + 1);
      }

      if (done) {
        const ok = results.filter(Boolean).length;
        const pct = Math.round((ok / exs.length) * 100);
        return (
          <div style={{ textAlign: "center", padding: "1.5rem 0" }}>
            <div style={{ fontSize: 48, marginBottom: 10 }}>{pct === 100 ? "🏆" : pct >= 70 ? "⭐" : "💪"}</div>
            <div style={{ fontSize: 24, fontWeight: 700, color: "#1A1A1A", marginBottom: 4 }}>
              {ok} / {exs.length} 正解
            </div>
            <div style={{ fontSize: 13, color: "#888", marginBottom: 16 }}>
              {pct === 100 ? "完璧！Sempurna!" : pct >= 70 ? "よくできました！Bagus!" : "もう一度練習しましょう！"}
            </div>
            <div style={{ textAlign: "left", marginBottom: 20 }}>
              {exs.map((ex, i) => (
                <div key={i} style={{
                  background: results[i] ? "#EAF6EF" : "#FDEDEF",
                  border: `1px solid ${results[i] ? "#3DAB7A" : "#E24B4A"}`,
                  borderRadius: 10, padding: "10px 14px", marginBottom: 8,
                }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: results[i] ? "#1A6B40" : "#8B1A1A", marginBottom: 3 }}>
                    問{i + 1} {results[i] ? "○" : "✕"} — {ex.ctx}
                  </div>
                  <div style={{ fontSize: 13, color: "#333" }}>
                    {ex.type === "fill" ? ex.exFull : ex.answer.join(" ")}
                  </div>
                  <div style={{ fontSize: 12, color: "#777", fontStyle: "italic" }}>
                    {ex.type === "fill" ? ex.exIndo : ex.meaning}
                  </div>
                </div>
              ))}
            </div>
            <button onClick={() => { setQIdx(0); setResults([]); setDone(false); }} style={{
              padding: "11px 28px", borderRadius: 10, border: "none",
              background: lesson.color, color: "#fff",
              fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
            }}>もう一度 / Ulangi</button>
          </div>
        );
      }

      return (
        <div>
          <div style={{
            background: lesson.light, border: `1px solid ${lesson.color}33`,
            borderRadius: 10, padding: "10px 14px", marginBottom: 16,
            fontSize: 13, color: lesson.color, fontWeight: 600,
          }}>
            🎭 {lesson.conversation.scene}
          </div>
          <ExerciseWithResult
            key={`${lesson.id}-${qIdx}`}
            ex={exs[qIdx]}
            color={lesson.color}
            light={lesson.light}
            qNum={qIdx}
            total={exs.length}
            isLast={qIdx + 1 >= exs.length}
            onDone={handleDone}
          />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  GRAMMAR MODULE
    // ═══════════════════════════════════════════════════════════
    function GrammarModule({ lesson }) {
      const [idx, setIdx] = useState(0);
      const [sel, setSel] = useState(null);
      const [confirmed, setConfirmed] = useState(false);
      const [results, setResults] = useState([]);
      const [done, setDone] = useState(false);

      useEffect(() => { setIdx(0); setSel(null); setConfirmed(false); setResults([]); setDone(false); }, [lesson.id]);

      const qs = lesson.grammar;
      const q = qs[idx];
      const correct = sel === q.answer;

      function next() {
        const nr = [...results, sel === q.answer];
        setResults(nr);
        setSel(null); setConfirmed(false);
        if (idx + 1 >= qs.length) setDone(true);
        else setIdx(i => i + 1);
      }

      if (done) {
        const ok = results.filter(Boolean).length;
        const pct = Math.round((ok / qs.length) * 100);
        return (
          <div style={{ textAlign: "center", padding: "1.5rem 0" }}>
            <div style={{ fontSize: 40, marginBottom: 10 }}>{pct === 100 ? "🏆" : pct >= 75 ? "⭐" : "💪"}</div>
            <div style={{ fontSize: 24, fontWeight: 700, color: "#1A1A1A", marginBottom: 4 }}>{ok}/{qs.length} 正解</div>
            <div style={{ fontSize: 13, color: "#888", marginBottom: 16 }}>
              {pct === 100 ? "完璧！Sempurna!" : pct >= 75 ? "よくできました！Bagus!" : "もう一度！"}
            </div>
            <div style={{ marginBottom: 16 }}>
              {qs.map((gq, i) => (
                <div key={i} style={{
                  background: results[i] ? "#EAF6EF" : "#FDEDEF",
                  border: `1px solid ${results[i] ? "#3DAB7A" : "#E24B4A"}`,
                  borderRadius: 10, padding: "10px 14px", marginBottom: 8, textAlign: "left",
                }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: results[i] ? "#1A6B40" : "#8B1A1A", marginBottom: 2 }}>
                    {results[i] ? "○" : "✕"} {gq.rule}
                  </div>
                  <div style={{ fontSize: 12, color: "#555" }}>正解: {gq.choices[gq.answer]}</div>
                </div>
              ))}
            </div>
            <button onClick={() => { setIdx(0); setSel(null); setConfirmed(false); setResults([]); setDone(false); }} style={{
              padding: "11px 28px", borderRadius: 10, border: "none",
              background: lesson.color, color: "#fff", fontSize: 14, fontWeight: 700,
              cursor: "pointer", fontFamily: "inherit",
            }}>もう一度 / Ulangi</button>
          </div>
        );
      }

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
            <div style={{ display: "flex", gap: 4 }}>
              {qs.map((_, i) => (
                <div key={i} style={{
                  width: i === idx ? 18 : 7, height: 7, borderRadius: 4,
                  background: results[i] != null ? (results[i] ? "#3DAB7A" : "#E24B4A") : i === idx ? lesson.color : "#DDD",
                  transition: "all 0.3s",
                }}/>
              ))}
            </div>
            <span style={{ fontSize: 12, color: "#888" }}>問{idx + 1}/{qs.length}</span>
          </div>

          <div style={{
            background: lesson.light, border: `1px solid ${lesson.color}44`,
            borderRadius: 10, padding: "10px 14px", marginBottom: 16,
          }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: lesson.color }}>{q.rule}</div>
            <div style={{ fontSize: 12, color: "#777", marginTop: 2, fontStyle: "italic" }}>{q.ruleIndo}</div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#1A1A1A", lineHeight: 1.5, marginBottom: 3 }}>{q.question}</div>
            <div style={{ fontSize: 12, color: "#888", fontStyle: "italic" }}>{q.questionIndo}</div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 16 }}>
            {q.choices.map((c, i) => {
              let bg = "#FAFAF8", border = "#DDD", tc = "#333", dot = "#DDD";
              if (confirmed) {
                if (i === q.answer) { bg = "#EAF6EF"; border = "#3DAB7A"; tc = "#1A6B40"; dot = "#3DAB7A"; }
                else if (i === sel) { bg = "#FDEDEF"; border = "#E24B4A"; tc = "#8B1A1A"; dot = "#E24B4A"; }
              } else if (sel === i) { bg = `${lesson.color}15`; border = lesson.color; tc = lesson.color; dot = lesson.color; }
              return (
                <button key={i} onClick={() => !confirmed && setSel(i)} style={{
                  background: bg, border: `1.5px solid ${border}`, borderRadius: 10,
                  padding: "10px 12px", fontSize: 13, fontWeight: 500, color: tc,
                  cursor: confirmed ? "default" : "pointer", textAlign: "left",
                  fontFamily: "inherit", transition: "all 0.15s",
                  display: "flex", alignItems: "center", gap: 7,
                }}>
                  <span style={{
                    width: 20, height: 20, borderRadius: "50%", flexShrink: 0,
                    background: dot, color: "#fff", fontSize: 10, fontWeight: 700,
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}>{["A","B","C","D"][i]}</span>
                  {c}
                </button>
              );
            })}
          </div>

          {confirmed && (
            <div style={{
              borderRadius: 10, padding: "12px 14px", marginBottom: 14,
              background: correct ? "#EAF6EF" : "#FDEDEF",
              border: `1px solid ${correct ? "#3DAB7A" : "#E24B4A"}`,
            }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: correct ? "#1A6B40" : "#8B1A1A", marginBottom: 4 }}>
                {correct ? "○ 正解！Benar！" : "✕ 不正解 Salah"}
              </div>
              <div style={{ fontSize: 13, color: "#444", lineHeight: 1.6 }}>{q.explanation}</div>
              <div style={{ fontSize: 12, color: "#777", marginTop: 3, fontStyle: "italic" }}>{q.explanationIndo}</div>
            </div>
          )}

          {!confirmed ? (
            <button onClick={() => sel !== null && setConfirmed(true)} disabled={sel === null} style={{
              width: "100%", padding: "11px 0", borderRadius: 10, border: "none",
              background: sel !== null ? lesson.color : "#CCC",
              color: "#fff", fontSize: 14, fontWeight: 700,
              cursor: sel !== null ? "pointer" : "default",
              fontFamily: "inherit", transition: "background 0.2s",
            }}>確認する / Cek Jawaban</button>
          ) : (
            <button onClick={next} style={{
              width: "100%", padding: "11px 0", borderRadius: 10, border: "none",
              background: idx + 1 >= qs.length ? "#3DAB7A" : lesson.color,
              color: "#fff", fontSize: 14, fontWeight: 700,
              cursor: "pointer", fontFamily: "inherit",
            }}>
              {idx + 1 >= qs.length ? "結果を見る / Lihat Hasil →" : "次へ / Berikutnya →"}
            </button>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  APP
    // ═══════════════════════════════════════════════════════════
    const MODES = [
      { id: "flash",   label: "フラッシュカード", labelIndo: "Kartu Kata",    icon: "🃏" },
      { id: "conv",    label: "場面別会話練習",    labelIndo: "Latihan Kalimat", icon: "💬" },
      { id: "grammar", label: "文法クイズ",        labelIndo: "Tata Bahasa",   icon: "📝" },
    ];

    function App() {
      const [lessonId, setLessonId] = useState(1);
      const [mode, setMode] = useState("flash");
      const lesson = LESSONS.find(l => l.id === lessonId);

      return (
        <div style={{ fontFamily: "'Noto Sans JP', 'Hiragino Sans', sans-serif", background: "#F7F6F2", minHeight: "100vh" }}>
          <div style={{
            background: "#fff", borderBottom: "1px solid #E8E6DF",
            padding: "10px 16px", position: "sticky", top: 0, zIndex: 20,
          }}>
            <div style={{ maxWidth: 680, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", marginBottom: 10 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#1A1A1A" }}>🌸 いろどり 学習アプリ</div>
                <div style={{ fontSize: 11, color: "#CCC", marginLeft: "auto" }}>Irodori Tingkat Pemula</div>
              </div>
              <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 2 }}>
                {LESSONS.map(l => (
                  <button key={l.id} onClick={() => setLessonId(l.id)} style={{
                    flexShrink: 0, padding: "5px 14px", borderRadius: 999,
                    border: `1.5px solid ${l.id === lessonId ? l.color : "#DDD"}`,
                    background: l.id === lessonId ? l.color : "transparent",
                    color: l.id === lessonId ? "#fff" : "#666",
                    fontSize: 12, fontWeight: 600, cursor: "pointer",
                    fontFamily: "inherit", transition: "all 0.18s",
                  }}>{l.num}</button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 680, margin: "0 auto", padding: "16px" }}>
            <div style={{
              background: lesson.color, borderRadius: 14,
              padding: "14px 20px", marginBottom: 14,
              display: "flex", alignItems: "center",
            }}>
              <div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.7)", marginBottom: 2 }}>{lesson.num} · {lesson.indo}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>{lesson.title}</div>
              </div>
              <div style={{ marginLeft: "auto", textAlign: "right" }}>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.65)" }}>単語 {lesson.flashcards.length}語 · 文法 {lesson.grammar.length}問</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.65)" }}>会話練習 {lesson.conversation.exercises.length}問</div>
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
              {MODES.map(m => (
                <button key={m.id} onClick={() => setMode(m.id)} style={{
                  padding: "10px 6px", borderRadius: 10,
                  border: `1.5px solid ${m.id === mode ? lesson.color : "#E0DED8"}`,
                  background: m.id === mode ? lesson.light : "#fff",
                  cursor: "pointer", fontFamily: "inherit", transition: "all 0.18s",
                }}>
                  <div style={{ fontSize: 20, marginBottom: 3 }}>{m.icon}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: m.id === mode ? lesson.color : "#555" }}>{m.label}</div>
                  <div style={{ fontSize: 10, color: "#AAA" }}>{m.labelIndo}</div>
                </button>
              ))}
            </div>

            <div style={{ background: "#fff", border: "1px solid #E8E6DF", borderRadius: 16, padding: "20px 18px" }}>
              {mode === "flash"   && <FlashcardModule key={`f-${lessonId}`} lesson={lesson}/>}
              {mode === "conv"    && <ConvModule      key={`c-${lessonId}`} lesson={lesson}/>}
              {mode === "grammar" && <GrammarModule   key={`g-${lessonId}`} lesson={lesson}/>}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
